<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Contact — Hannah Smith Photography</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>

  <!-- ══ NAVIGATION ══ -->
  <nav>
    <a href="index.html" class="nav-logo">Hannah Smith Photography</a>
    <ul class="nav-links">
      <li><a href="index.html#work">Work</a></li>
      <li><a href="contact.html" class="active">Contact</a></li>
    </ul>
  </nav>

  <div class="contact-wrap">

    <!-- LEFT: Dark panel -->
    <div class="contact-dark">
      <span class="eyebrow">Get In Touch</span>
      <h1>Let's Work<br>Together</h1>

      <ul class="contact-list">

        <!-- REPLACE YOUR-EMAIL-HERE with your actual email -->
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
          <div>
            <span class="c-label">Email</span>
            <a href="mailto:YOUR-EMAIL-HERE" class="c-value">YOUR-EMAIL-HERE</a>
          </div>
        </li>

        <!-- REPLACE YOUR-PHONE-HERE with your actual phone, or delete this block -->
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M22 16.92v3a2 2 0 0 1-2.18 2 19.79 19.79 0 0 1-8.63-3.07A19.5 19.5 0 0 1 4.69 12 19.79 19.79 0 0 1 1.62 3.5 2 2 0 0 1 3.59 1.32h3a2 2 0 0 1 2 1.72 12.84 12.84 0 0 0 .7 2.81 2 2 0 0 1-.45 2.11L7.91 8.96a16 16 0 0 0 6 6l.92-.92a2 2 0 0 1 2.11-.45 12.84 12.84 0 0 0 2.81.7A2 2 0 0 1 22 16.92z"></path>
          </svg>
          <div>
            <span class="c-label">Phone</span>
            <span class="c-value">YOUR-PHONE-HERE</span>
          </div>
        </li>

        <!-- Location -->
        <li>
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path>
            <circle cx="12" cy="10" r="3"></circle>
          </svg>
          <div>
            <span class="c-label">Based In</span>
            <span class="c-value">Montréal, Québec</span>
          </div>
        </li>

      </ul>

      <!-- REPLACE # with your Instagram URL e.g. https://instagram.com/yourhandle -->
      <div class="social-row">
        <a href="#" aria-label="Instagram">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <rect x="2" y="2" width="20" height="20" rx="5"></rect>
            <circle cx="12" cy="12" r="4"></circle>
            <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"></circle>
          </svg>
        </a>
        <a href="mailto:YOUR-EMAIL-HERE" aria-label="Email">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
            <polyline points="22,6 12,13 2,6"></polyline>
          </svg>
        </a>
      </div>
    </div>

    <!-- RIGHT: QR code panel -->
    <div class="contact-qr">
      <span class="eyebrow">Scan To Connect</span>
      <h2>Find My Work</h2>

      <!--
        QR CODE
        Once you have a QR code image:
        1. Upload it to: images/about/qr-code.png
        2. Delete the <div class="qr-placeholder"> block below
        3. Uncomment the <div class="qr-frame"> block

        Generate a free QR code at: https://qr.io
      -->

      <!-- PLACEHOLDER — delete once you have a real QR code -->
      <div class="qr-placeholder">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="3" width="7" height="7"></rect>
          <rect x="14" y="3" width="7" height="7"></rect>
          <rect x="3" y="14" width="7" height="7"></rect>
          <rect x="14" y="14" width="3" height="3"></rect>
          <rect x="18" y="14" width="3" height="3"></rect>
          <rect x="14" y="18" width="3" height="3"></rect>
          <rect x="18" y="18" width="3" height="3"></rect>
        </svg>
        <p>QR Code</p>
      </div>

      <!-- REAL QR — uncomment when ready
      <div class="qr-frame">
        <img src="images/about/qr-code.png" alt="Scan to view my work" />
      </div>
      -->

      <p class="qr-caption">Scan to view my work</p>
    </div>

  </div>

  <!-- ══ FOOTER ══ -->
  <footer>
    <span class="footer-copy">&copy; 2024 Hannah Smith Photography</span>
    <div class="footer-icons">
      <a href="#" aria-label="Instagram">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <rect x="2" y="2" width="20" height="20" rx="5"></rect>
          <circle cx="12" cy="12" r="4"></circle>
          <circle cx="17.5" cy="6.5" r="0.5" fill="currentColor" stroke="none"></circle>
        </svg>
      </a>
      <a href="mailto:YOUR-EMAIL-HERE" aria-label="Email">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
          <path d="M4 4h16c1.1 0 2 .9 2 2v12c0 1.1-.9 2-2 2H4c-1.1 0-2-.9-2-2V6c0-1.1.9-2 2-2z"></path>
          <polyline points="22,6 12,13 2,6"></polyline>
        </svg>
      </a>
    </div>
  </footer>

</body>
</html>
